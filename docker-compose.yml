services:
  # --- MODO DESARROLLO (ION-DEV) ---
  # Recarga rápida, volúmenes de código mapeados, logs detallados.
  dev:
    build:
      context: .
      target: dev
      args:
        ZEROCLAW_CARGO_FEATURES: "channel-lark,whatsapp-web"
    container_name: ion-dev
    volumes:
      - ion-cargo-cache:/usr/local/cargo/registry
      - ion-target-cache:/app/target
      - ion-data-vol:/ion-data
    environment:
      - RUST_LOG=info
      - ION_WORKSPACE=/ion-data/workspace
      - ION_GATEWAY_PORT=42617
      - ZEROCLAW_CONFIG_DIR=/ion-data/.ion
    ports:
      - "42617:42617"
    command: daemon

  # --- MODO PRODUCCIÓN (ION-PROD) ---
  # Binario optimizado, 2FA activo, imagen minimalista.
  prod:
    build:
      context: .
      target: release
    container_name: ion-prod
    volumes:
      - ion-data-vol:/ion-data
    environment:
      - ION_WORKSPACE=/ion-data/workspace
      - ION_GATEWAY_PORT=42617
    ports:
      - "42617:42617"
    restart: always
    command: daemon

volumes:
  ion-cargo-cache:
  ion-target-cache:
  ion-data-vol:
